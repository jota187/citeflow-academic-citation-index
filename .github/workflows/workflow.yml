name: CiteFlow Daily Update

on:
  schedule:
    - cron: '0 5 * * *'  # Runs daily at 5:00 AM UTC
  workflow_dispatch:  # Allows manual triggering

jobs:
  update-database:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
      GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
      SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
      CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Create credentials files
      run: |
        echo "${{ secrets.GOOGLE_CREDENTIALS_JSON }}" > credentials.json
        echo "${{ secrets.GOOGLE_TOKEN_JSON }}" > token.json

    - name: Set environment variables
      run: |
        echo "SEMANTIC_SCHOLAR_API_KEY=${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}" >> $GITHUB_ENV
        echo "CROSSREF_MAILTO=${{ secrets.CROSSREF_MAILTO }}" >> $GITHUB_ENV

    - name: Delete existing database
      run: rm -f data/citeflow.db

    - name: Create database
      run: python -m citeflow.db

    - name: Import new emails
      run: python -m citeflow.main

    - name: Enrich database
      run: python -m citeflow.enrich

    - name: Upload database as artifact
      uses: actions/upload-artifact@v4
      with:
        name: citeflow-database
        path: data/citeflow.db