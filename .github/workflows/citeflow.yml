name: CiteFlow Pipeline

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  actions: read
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare data directory
        run: mkdir -p data

      - name: Download latest DB artifact (if any)
        env:
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          ARTIFACT_NAME: citeflow-db
        run: |
          python - <<'PY'
          import io, os, sys, zipfile
          import requests

          repo = os.environ.get("GITHUB_REPO")
          token = os.environ.get("GITHUB_TOKEN")
          name = os.environ.get("ARTIFACT_NAME", "citeflow-db")
          if not repo or not token:
              print("Skipping artifact download (missing repo/token).")
              sys.exit(0)

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "User-Agent": "citeflow-actions/1.0",
          }

          url = f"https://api.github.com/repos/{repo}/actions/artifacts?per_page=100"
          resp = requests.get(url, headers=headers, timeout=30)
          if resp.status_code != 200:
              print(f"Failed to list artifacts: HTTP {resp.status_code}")
              print(resp.text[:300])
              sys.exit(0)

          data = resp.json()
          artifacts = [a for a in data.get("artifacts", []) if a.get("name") == name and not a.get("expired")]
          if not artifacts:
              print("No artifact found.")
              sys.exit(0)
          artifacts.sort(key=lambda a: a.get("created_at", ""), reverse=True)
          archive_url = artifacts[0].get("archive_download_url")
          if not archive_url:
              print("No archive_download_url.")
              sys.exit(0)

          resp = requests.get(archive_url, headers=headers, timeout=60, allow_redirects=True)
          if resp.status_code != 200:
              print(f"Failed to download artifact: HTTP {resp.status_code}")
              print(resp.text[:300])
              sys.exit(0)

          with zipfile.ZipFile(io.BytesIO(resp.content), "r") as zf:
              target = None
              for name in zf.namelist():
                  if name.endswith("data/citeflow.db") or name.endswith("citeflow.db"):
                      target = name
                      break
              if not target:
                  print("Artifact does not contain citeflow.db")
                  sys.exit(0)
              zf.extract(target, ".")
          print("Downloaded latest DB artifact.")
          PY

      - name: Run pipeline
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
        run: |
          python -m citeflow.main
          python -m citeflow.enrich

      - name: Upload DB artifact
        uses: actions/upload-artifact@v4
        with:
          name: citeflow-db
          path: data/citeflow.db
